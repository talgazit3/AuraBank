<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Bank | TGI Official</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.12); --blur: blur(20px); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; background: #020617; color: white; overflow: hidden; }
        #app { width: 100%; height: 100%; display: flex; flex-direction: column; background: linear-gradient(145deg, #0f172a, #1e1b4b); }
        .screen { display: none; flex-direction: column; padding: 20px; height: 100%; box-sizing: border-box; overflow-y: auto; }
        .active { display: flex; }
        
        #loginScreen { justify-content: center; align-items: center; }
        .login-container { width: 100%; max-width: 350px; }

        .glass-card { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.08); color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: white; color: #1e1b4b; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .aura-circle { width: 200px; height: 200px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 10px auto 30px auto; background: rgba(255,255,255,0.05); }
        
        #sideMenu { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: #fff; color: #1e1b4b; z-index: 1000; transition: 0.4s; padding: 30px; box-sizing: border-box; }
        .menu-open { right: 0 !important; }
        
        .user-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .hist-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .calc-btn { background: rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 10px; font-size: 18px; border: none; cursor: pointer; }
        .admin-item { border-bottom: 1px solid #ddd; padding: 10px 0; font-size: 14px; color: #333; display: flex; justify-content: space-between; align-items: center; }
        
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { width: 100%; max-width: 400px; text-align: center; }
        .appeal-btn { background: none; border: 1px solid #ff4444; color: #ff4444; padding: 5px 10px; border-radius: 8px; font-size: 12px; width: auto; margin: 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="customModal">
        <div class="modal-content glass-card">
            <h3 id="modalTitle">הודעה</h3>
            <p id="modalText"></p>
            <div id="modalInputArea" style="display:none;"><textarea id="modalInput" placeholder="כתוב כאן..."></textarea></div>
            <div style="display:flex; gap: 10px;">
                <button id="modalConfirmBtn">אישור</button>
                <button id="modalCancelBtn" style="background:none; border:1px solid white; color:white; display:none;">ביטול</button>
            </div>
        </div>
    </div>

    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <h1 style="text-align:center; margin-bottom: 30px;">Aura Bank</h1>
            <div class="glass-card">
                <input type="text" id="logUser" placeholder="שם משתמש">
                <input type="password" id="logPass" placeholder="סיסמה">
                <button onclick="authLogin()">כניסה</button>
                <p style="text-align:center; margin-top:20px; font-size: 14px; cursor: pointer;" onclick="showScreen('signScreen')">אין לך חשבון? הרשמה</p>
            </div>
        </div>
    </div>

    <div id="signScreen" class="screen">
        <h2>הרשמה</h2>
        <div class="glass-card">
            <input type="text" id="sFull" placeholder="שם מלא">
            <input type="text" id="sUser" placeholder="שם משתמש">
            <input type="password" id="sP1" placeholder="סיסמה">
            <input type="password" id="sP2" placeholder="אימות סיסמה">
            <input type="text" id="sMail" placeholder="אימייל / טלפון">
            <button onclick="authRegister()">צור חשבון</button>
            <p onclick="showScreen('loginScreen')" style="cursor: pointer;">חזור</p>
        </div>
    </div>

    <div id="homeScreen" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3 id="helloName">שלום</h3>
            <span style="font-size:30px; cursor: pointer;" onclick="toggleMenu(true)">☰</span>
        </div>
        <div class="aura-circle">
            <h1 id="auraVal">0</h1>
            <span>אורה</span>
        </div>
        <button onclick="showScreen('usersListScreen')">שלח נקודות אורה</button>
        <button style="background:none; border:1px solid white; color:white; margin-top:10px" onclick="openHistoryScreen()">היסטוריה</button>
    </div>

    <div id="usersListScreen" class="screen">
        <button onclick="showScreen('homeScreen')" style="width: 80px; margin-bottom: 15px;">חזור</button>
        <div id="friendsListContainer"></div>
    </div>

    <div id="historyScreen" class="screen">
        <button onclick="showScreen('homeScreen')" style="width: 80px; margin-bottom: 15px;">חזור</button>
        <div id="historyListContainer" class="glass-card"></div>
    </div>

    <div id="calcScreen" class="screen">
        <h3 id="targetName">שליחה</h3>
        <div class="glass-card">
            <h1 id="calcDisp" style="text-align:center; font-size:45px">0</h1>
            <div class="calc-grid">
                <button class="calc-btn" onclick="pNum('1')">1</button>
                <button class="calc-btn" onclick="pNum('2')">2</button>
                <button class="calc-btn" onclick="pNum('3')">3</button>
                <button class="calc-btn" onclick="pNum('4')">4</button>
                <button class="calc-btn" onclick="pNum('5')">5</button>
                <button class="calc-btn" onclick="pNum('6')">6</button>
                <button class="calc-btn" onclick="pNum('7')">7</button>
                <button class="calc-btn" onclick="pNum('8')">8</button>
                <button class="calc-btn" onclick="pNum('9')">9</button>
                <button class="calc-btn" style="background:#22c55e" onclick="setO('+')">+</button>
                <button class="calc-btn" onclick="pNum('0')">0</button>
                <button class="calc-btn" style="background:#ef4444" onclick="setO('-')">-</button>
                <button class="calc-btn" style="grid-column: span 3; background:#475569" onclick="backspace()">מחיקה</button>
            </div>
            <input type="text" id="sendReason" placeholder="סיבה (חובה)">
            <button onclick="finalizeAura()">בצע שליחה</button>
        </div>
        <button onclick="showScreen('usersListScreen')" style="background:none; border:1px solid white; color:white;">ביטול</button>
    </div>

    <div id="devPanel" class="screen">
        <button onclick="showScreen('homeScreen')">חזרה</button>
        <h2 style="color:#dc2626">Admin - TGI</h2>
        <div id="changeRequests" class="glass-card" style="background:white; color:#111"></div>
        <div id="allUsersList" class="glass-card" style="background:white; color:#111"></div>
    </div>

    <div id="sideMenu">
        <h3>הגדרות</h3>
        <button onclick="openRequestModal('שינוי פרטים')">בקשה לשינוי פרטים</button>
        <div id="adminLink" style="display:none;"><button style="background:#1e1b4b; color:white; margin-top:10px;" onclick="openAdmin()">Admin Panel</button></div>
        <button onclick="logout()" style="color:red; margin-top:20px;">התנתק</button>
        <button onclick="toggleMenu(false)" style="margin-top:20px;">סגור</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, getDocs, onSnapshot, addDoc, serverTimestamp, query, where, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCiHk4FT5DqNrBTLSwKTIu_L7t5Zau2bK4",
        authDomain: "aurabank-75d81.firebaseapp.com",
        projectId: "aurabank-75d81",
        storageBucket: "aurabank-75d81.firebasestorage.app",
        messagingSenderId: "1007350772238",
        appId: "1:1007350772238:web:130462b5421850bc44025f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let user = null;
    let targetId = null;
    let cVal = "";
    let usersUnsubscribe = null;

    window.ui = {
        alert: (title, text, cb) => {
            const m = document.getElementById('customModal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('modalInputArea').style.display='none';
            document.getElementById('modalCancelBtn').style.display='none';
            m.style.display='flex';
            document.getElementById('modalConfirmBtn').onclick=()=>{ m.style.display='none'; if(cb) cb(); };
        },
        prompt: (title, text, cb) => {
            const m = document.getElementById('customModal');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('modalInputArea').style.display='block';
            document.getElementById('modalCancelBtn').style.display='block';
            m.style.display='flex';
            document.getElementById('modalConfirmBtn').onclick=()=>{ const v = document.getElementById('modalInput').value; m.style.display='none'; cb(v); };
            document.getElementById('modalCancelBtn').onclick=()=>{ m.style.display='none'; cb(null); };
        }
    };

    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'usersListScreen') renderUsers();
    };

    window.toggleMenu = (o) => document.getElementById('sideMenu').classList.toggle('menu-open', o);

    window.authLogin = async () => {
        const u = document.getElementById('logUser').value.trim();
        const p = document.getElementById('logPass').value;
        if(p === "4468800") {
            localStorage.setItem('tgi_dev_mode', 'true');
            if(u === "") { init({fullName:"מפתח מערכת", username:"admin", aura:999}); return; }
        }
        const snap = await getDoc(doc(db, "users", u));
        if(snap.exists() && snap.data().password === p) init(snap.data());
        else ui.alert("שגיאה", "פרטים שגויים");
    };

    window.authRegister = async () => {
        const u = document.getElementById('sUser').value.trim();
        const f = document.getElementById('sFull').value.trim();
        const p = document.getElementById('sP1').value;
        if(!u || !f || !p) return ui.alert("שגיאה", "מלא הכל");
        const userData = { fullName:f, username:u, password:p, aura:0 };
        await setDoc(doc(db, "users", u), userData);
        init(userData);
    };

    function init(d) {
        user = d;
        localStorage.setItem('aura_uid', d.username);
        document.getElementById('helloName').innerText = "שלום, " + d.fullName;
        if(localStorage.getItem('tgi_dev_mode') === 'true') document.getElementById('adminLink').style.display = 'block';
        showScreen('homeScreen');
        if(d.username !== "admin") {
            onSnapshot(doc(db, "users", d.username), (s) => { if(s.exists()) document.getElementById('auraVal').innerText = s.data().aura; });
        } else { document.getElementById('auraVal').innerText = "∞"; }
    }

    async function renderUsers() {
        const cont = document.getElementById('friendsListContainer');
        cont.innerHTML = "טוען...";
        const snap = await getDocs(collection(db, "users"));
        cont.innerHTML = "";
        snap.forEach(d => {
            if(d.id === user.username) return;
            const row = document.createElement('div');
            row.className = "user-row";
            row.innerHTML = `<div>${d.data().fullName}</div><button onclick="startSend('${d.id}','${d.data().fullName}')" style="width:70px; margin:0;">שלח</button>`;
            cont.appendChild(row);
        });
    }

    window.startSend = (id, name) => { targetId = id; cVal = ""; document.getElementById('targetName').innerText = name; showScreen('calcScreen'); };
    window.pNum = (n) => { cVal += n; document.getElementById('calcDisp').innerText = cVal; };
    window.setO = (o) => { if(!cVal.includes('+')) cVal = o + cVal; document.getElementById('calcDisp').innerText = cVal; };
    window.backspace = () => { cVal = cVal.slice(0,-1); document.getElementById('calcDisp').innerText = cVal || "0"; };

    window.finalizeAura = async () => {
        const amt = parseInt(cVal);
        const r = document.getElementById('sendReason').value;
        if(isNaN(amt) || !r) return ui.alert("שגיאה", "הזן סכום וסיבה");
        
        // תיקון חשוב: אם זה אדמין, לא מנסים להחסיר ממנו (כי אין לו מסמך)
        if(user.username !== "admin") {
            await updateDoc(doc(db, "users", user.username), { aura: increment(-amt) });
        }
        
        await updateDoc(doc(db, "users", targetId), { aura: increment(amt) });
        await addDoc(collection(db, "history"), { from: user.username, to: targetId, amount: amt, reason: r, time: serverTimestamp() });
        ui.alert("הצלחה", "הנקודות נשלחו", () => showScreen('homeScreen'));
    };

    window.openHistoryScreen = async () => {
        showScreen('historyScreen');
        const cont = document.getElementById('historyListContainer');
        cont.innerHTML = "טוען...";
        const qR = query(collection(db, "history"), where("to", "==", user.username));
        const qS = query(collection(db, "history"), where("from", "==", user.username));
        const [rS, sS] = await Promise.all([getDocs(qR), getDocs(qS)]);
        let all = [];
        rS.forEach(d => all.push({...d.data(), id:d.id, type:'recv'}));
        sS.forEach(d => all.push({...d.data(), id:d.id, type:'sent'}));
        cont.innerHTML = "";
        all.forEach(h => {
            const div = document.createElement('div');
            div.className = "hist-item";
            div.innerHTML = `<div><b>${h.type==='recv'?'קיבלת':'שלחת'} ${h.amount}</b><br><small>${h.reason}</small></div>
            ${h.type==='recv'?`<button class="appeal-btn" onclick="appeal('${h.id}','${h.from}',${h.amount})">ערעור</button>`:''}`;
            cont.appendChild(div);
        });
    };

    window.appeal = (id, from, amt) => {
        ui.prompt("ערעור", "סיבה:", (res) => {
            if(res) addDoc(collection(db, "requests"), { user:user.username, type:"ערעור", target:from, amount:amt, reason:res });
        });
    };

    window.openAdmin = () => {
        showScreen('devPanel');
        onSnapshot(collection(db, "requests"), (snap) => {
            const cont = document.getElementById('changeRequests'); cont.innerHTML = "<h4>ערעורים</h4>";
            snap.forEach(r => {
                const d = r.data();
                const div = document.createElement('div'); div.className = "admin-item";
                div.innerHTML = `<div>${d.user}: ${d.reason} (${d.amount})</div>
                <button onclick="approveAppeal('${r.id}','${d.user}','${d.target}',${d.amount})">אשר</button>`;
                cont.appendChild(div);
            });
        });
    };

    window.approveAppeal = async (id, claimant, sender, amt) => {
        await updateDoc(doc(db, "users", claimant), { aura: increment(amt) });
        // לאדמין תמיד מותר להחזיר נקודות גם אם השולח המקורי במינוס
        await updateDoc(doc(db, "users", sender), { aura: increment(-amt) });
        await deleteDoc(doc(db, "requests", id));
        ui.alert("בוצע", "הערעור אושר");
    };

    window.logout = () => { localStorage.clear(); location.reload(); };

    const saved = localStorage.getItem('aura_uid');
    if(saved) {
        if(saved === "admin") init({fullName:"מפתח מערכת", username:"admin", aura:999});
        else getDoc(doc(db, "users", saved)).then(s => { if(s.exists()) init(s.data()); });
    }
</script>
</body>
</html>
